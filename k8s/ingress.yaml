apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authwebapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers: "4 256k"
spec:
  ingressClassName: public
  rules:
    - host: auth.digitart.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Route to the frontend (SPA) service
                name: authwebapp-frontend-service
                port:
                  number: 80
          - path: /favicon.ico
            pathType: Exact
            backend:
              service:
                name: authwebapp-frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                # Route API-prefixed requests to frontend (dev server on 5173)
                name: authwebapp-frontend-service
                port:
                  number: 80
          - path: /admin
            pathType: Prefix
            backend:
              service:
                # Serve client-side /admin routes from frontend
                name: authwebapp-frontend-service
                port:
                  number: 80
  tls:
    - hosts:
        - auth.digitart.jp
      secretName: authwebapp-tls