# 役割: ローカル一括起動（Supabase Auth + DB 使用, postgres/keycloak 不要）

services:
  backend:
    build:
      context: ./backend
    environment:
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      BOT_INTERNAL_URL: http://discord-bot:8000/internal/sync
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_INVITE_CHANNEL_ID: ${DISCORD_INVITE_CHANNEL_ID:-}
      CONTACT_CHANNEL_ID: ${CONTACT_CHANNEL_ID:-1333116246006431816}
      DATABASE_URL: ${DATABASE_URL}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
    ports:
      - "8000:8000"
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"

  discord-bot:
    build:
      context: ./discord-bot
    environment:
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      BOT_PORT: ${BOT_PORT:-8000}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      PRE_MEMBER_ROLE_ID: ${PRE_MEMBER_ROLE_ID:-}
      MEMBER_ROLE_IDS: ${MEMBER_ROLE_IDS:-}
      ADMIN_ROLE_IDS: ${ADMIN_ROLE_IDS:-}
    ports:
      - "8001:8000"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"
