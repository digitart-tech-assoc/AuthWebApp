# 役割: ローカル一括起動

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-authwebapp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
      BOT_INTERNAL_URL: http://discord-bot:8000/internal/sync
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-1304058364560543815}
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/authwebapp}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  discord-bot:
    build:
      context: ./discord-bot
    environment:
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      BOT_PORT: ${BOT_PORT:-8000}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
    ports:
      - "8001:8000"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      SHARED_SECRET: ${SHARED_SECRET:-dev-secret}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
